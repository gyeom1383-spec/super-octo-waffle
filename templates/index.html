<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소나기 속 숨은 의미 찾기 🌧️</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #f0f4f8;
            color: #333;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 24px 16px;
        }
        h1 {
            font-size: 1.6rem;
            margin-bottom: 8px;
            color: #1a1a2e;
        }
        .caption {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 24px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .progress-bar {
            background: #e2e8f0;
            border-radius: 99px;
            height: 8px;
            margin: 12px 0 24px;
        }
        .progress-fill {
            background: #4f8ef7;
            height: 8px;
            border-radius: 99px;
            transition: width 0.4s;
        }
        .section-title {
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 10px;
            color: #444;
        }
        .q-btn {
            width: 100%;
            text-align: left;
            padding: 14px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-size: 0.95rem;
            margin-bottom: 8px;
            transition: background 0.2s;
        }
        .q-btn:hover { background: #f0f4f8; }
        .q-btn.done { color: #2e7d32; border-color: #a5d6a7; background: #f1f8e9; }
        .divider { border: none; border-top: 1px solid #e2e8f0; margin: 20px 0; }
        /* 질문 화면 */
        .back-btn {
            background: none;
            border: none;
            color: #4f8ef7;
            cursor: pointer;
            font-size: 0.95rem;
            margin-bottom: 16px;
            padding: 0;
        }
        .q-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
        .q-sub { font-size: 0.9rem; color: #666; margin-bottom: 16px; }
        .excerpt {
            background: #f8fafc;
            border-left: 4px solid #4f8ef7;
            padding: 16px;
            border-radius: 6px;
            line-height: 1.8;
            margin-bottom: 16px;
            font-size: 0.95rem;
        }
        .hint {
            background: #e8f4fd;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 0.9rem;
            color: #1565c0;
            margin-bottom: 8px;
        }
        .answer-frame {
            background: rgba(151,166,195,0.15);
            border-radius: 8px;
            padding: 14px 16px;
            font-size: 0.95rem;
            margin-bottom: 16px;
            color: #444;
        }
        textarea {
            width: 100%;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 12px;
            font-size: 0.95rem;
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
            margin-bottom: 12px;
        }
        textarea:focus { outline: none; border-color: #4f8ef7; }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #4f8ef7;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        .submit-btn:hover { background: #3a7bd5; }
        .submit-btn:disabled { background: #b0c4de; cursor: not-allowed; }
        .feedback-box {
            background: #f1f8e9;
            border: 1px solid #a5d6a7;
            border-radius: 8px;
            padding: 16px;
            margin-top: 16px;
            line-height: 1.8;
            font-size: 0.95rem;
            white-space: pre-wrap;
        }
        .spinner {
            text-align: center;
            padding: 20px;
            color: #666;
            display: none;
        }
        /* 인트로 화면 */
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;
            margin-bottom: 12px;
            background: white;
            font-family: inherit;
        }
        select:focus { outline: none; border-color: #4f8ef7; }
        label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9rem; }
        .start-btn {
            width: 100%;
            padding: 14px;
            background: #4f8ef7;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
        }
        .start-btn:hover { background: #3a7bd5; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container">

    <!-- 인트로 화면 -->
    <div id="intro-screen">
        <div class="card">
            <h1>🌧️ 소나기 속 숨은 의미 찾기</h1>
            <p class="caption">시작하기 전에 반과 모둠을 선택해주세요!</p>
            <hr class="divider">
            <label>📚 반을 선택하세요</label>
            <select id="select-class">
                {% for i in range(1, 10) %}
                <option value="{{ i }}반">{{ i }}반</option>
                {% endfor %}
            </select>
            <label>👥 모둠을 선택하세요</label>
            <select id="select-group">
                {% for i in range(1, 8) %}
                <option value="{{ i }}모둠">{{ i }}모둠</option>
                {% endfor %}
            </select>
            <button class="start-btn" onclick="startApp()">시작하기 🌧️</button>
        </div>
    </div>

    <!-- 메인 화면 -->
    <div id="main-screen" class="hidden">
        <h1>🌧️ 소나기 속 숨은 의미 찾기</h1>
        <p class="caption" id="main-caption"></p>
        <div class="card">
            <div id="progress-text" style="font-weight:700; font-size:0.95rem;"></div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill" style="width:0%"></div>
            </div>
            <div class="section-title">📝 개인 문항</div>
            <div id="individual-questions"></div>
            <hr class="divider">
            <div class="section-title">👥 모둠 문항</div>
            <div id="group-questions"></div>
        </div>
    </div>

    <!-- 질문 화면 -->
    <div id="question-screen" class="hidden">
        <button class="back-btn" onclick="showMain()">← 목록으로 돌아가기</button>
        <div class="card">
            <p class="caption" id="q-caption"></p>
            <div class="q-title" id="q-title"></div>
            <div class="q-sub" id="q-question"></div>
            <hr class="divider">
            <div class="excerpt" id="q-excerpt"></div>
            <div id="q-hints"></div>
            <hr class="divider">
            <div style="font-weight:700; font-size:0.9rem; margin-bottom:8px;">✏️ 답안 작성틀</div>
            <div class="answer-frame" id="q-answer-frame"></div>
            <div id="prev-feedback-box" class="hidden">
                <div style="font-weight:700; color:#2e7d32; margin-bottom:8px;">✅ 이전 피드백</div>
                <div class="feedback-box" id="prev-feedback-text"></div>
                <hr class="divider">
            </div>
            <textarea id="answer-input" placeholder=""></textarea>
            <div class="spinner" id="spinner">⏳ 인공지능 선생님이 꼼꼼하게 읽어보고 있어요...</div>
            <button class="submit-btn" id="submit-btn" onclick="submitAnswer()">제출하기</button>
            <div class="feedback-box hidden" id="feedback-result"></div>
        </div>
    </div>

</div>

<script>
    const QUESTIONS = {{ questions | tojson }};
    let studentClass = "";
    let studentGroup = "";
    let currentQId = null;
    let completed = new Set();
    let feedbacks = {};

    function startApp() {
        studentClass = document.getElementById("select-class").value;
        studentGroup = document.getElementById("select-group").value;
        showMain();
    }

    function showMain() {
        document.getElementById("intro-screen").classList.add("hidden");
        document.getElementById("question-screen").classList.add("hidden");
        document.getElementById("main-screen").classList.remove("hidden");

        document.getElementById("main-caption").textContent = `📚 ${studentClass} | 👥 ${studentGroup}`;

        const total = QUESTIONS.length;
        const done = completed.size;
        document.getElementById("progress-text").textContent = `진행 현황: ${done} / ${total} 문항 완료`;
        document.getElementById("progress-fill").style.width = `${(done / total) * 100}%`;

        const indiv = document.getElementById("individual-questions");
        const group = document.getElementById("group-questions");
        indiv.innerHTML = "";
        group.innerHTML = "";

        QUESTIONS.forEach((q, idx) => {
            const isDone = completed.has(q.id);
            const btn = document.createElement("button");
            btn.className = "q-btn" + (isDone ? " done" : "");
            btn.textContent = (isDone ? "✅ " : "") + q.label + " | " + q.tag;
            btn.onclick = () => showQuestion(q.id);
            if (idx < 2) indiv.appendChild(btn);
            else group.appendChild(btn);
        });
    }

    function showQuestion(qId) {
        currentQId = qId;
        const q = QUESTIONS.find(q => q.id === qId);

        document.getElementById("main-screen").classList.add("hidden");
        document.getElementById("intro-screen").classList.add("hidden");
        document.getElementById("question-screen").classList.remove("hidden");

        document.getElementById("q-caption").textContent = `📚 ${studentClass} | 👥 ${studentGroup}`;
        document.getElementById("q-title").textContent = `${q.label} | ${q.tag}`;
        document.getElementById("q-question").textContent = q.question;
        document.getElementById("q-excerpt").innerHTML = q.excerpt;
        document.getElementById("q-answer-frame").textContent = q.answer_frame;
        document.getElementById("answer-input").value = "";
        document.getElementById("answer-input").placeholder = q.placeholder;

        // 힌트 표시
        const hintsDiv = document.getElementById("q-hints");
        hintsDiv.innerHTML = "";
        q.hint.split("\n").forEach(h => {
            if (h.trim()) {
                const div = document.createElement("div");
                div.className = "hint";
                div.textContent = "💡 " + h.trim();
                hintsDiv.appendChild(div);
            }
        });

        // 이전 피드백
        const prevBox = document.getElementById("prev-feedback-box");
        if (feedbacks[qId]) {
            prevBox.classList.remove("hidden");
            document.getElementById("prev-feedback-text").textContent = feedbacks[qId];
        } else {
            prevBox.classList.add("hidden");
        }

        document.getElementById("feedback-result").classList.add("hidden");
        document.getElementById("feedback-result").textContent = "";
        document.getElementById("spinner").style.display = "none";
        document.getElementById("submit-btn").disabled = false;
    }

    async function submitAnswer() {
        const answer = document.getElementById("answer-input").value.trim();
        if (!answer) return;

        document.getElementById("submit-btn").disabled = true;
        document.getElementById("spinner").style.display = "block";
        document.getElementById("feedback-result").classList.add("hidden");

        try {
            const res = await fetch("/feedback", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    question_id: currentQId,
                    answer: answer,
                    student_class: studentClass,
                    student_group: studentGroup
                })
            });

            const data = await res.json();

            document.getElementById("spinner").style.display = "none";
            document.getElementById("submit-btn").disabled = false;

            if (data.feedback) {
                feedbacks[currentQId] = data.feedback;
                completed.add(currentQId);
                const box = document.getElementById("feedback-result");
                box.textContent = data.feedback;
                box.classList.remove("hidden");
            } else {
                alert("오류가 발생했습니다. 다시 시도해 주세요.");
            }
        } catch (e) {
            document.getElementById("spinner").style.display = "none";
            document.getElementById("submit-btn").disabled = false;
            alert("오류가 발생했습니다. 다시 시도해 주세요.");
        }
    }

    // 답안 입력 시 제출 버튼 활성화
    document.getElementById("answer-input").addEventListener("input", function() {
        document.getElementById("submit-btn").disabled = !this.value.trim();
    });
</script>
</body>
</html>
